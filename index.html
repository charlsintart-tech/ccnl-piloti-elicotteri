<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="CCNL Piloti">
  <meta name="theme-color" content="#1e3a5f">
  <title>CCNL Piloti Elicotteri</title>
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <link rel="manifest" href="manifest.json">
  <style>
    :root {
      --primary: #1e3a5f;
      --primary-light: #2a5a8f;
      --primary-dark: #0f2240;
      --accent: #e8a838;
      --bg: #f5f7fa;
      --bg-card: #ffffff;
      --text: #1a1a2e;
      --text-secondary: #5a6578;
      --border: #e2e8f0;
      --sidebar-width: 320px;
      --header-height: 56px;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      overflow: hidden;
      height: 100vh;
      height: 100dvh;
    }

    /* Header */
    .header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: calc(var(--header-height) + var(--safe-top));
      padding-top: var(--safe-top);
      background: var(--primary);
      color: white;
      display: flex;
      align-items: center;
      z-index: 100;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }

    .header-inner {
      display: flex;
      align-items: center;
      width: 100%;
      height: var(--header-height);
      padding: 0 16px;
      gap: 12px;
    }

    .menu-toggle {
      display: none;
      background: none;
      border: none;
      color: white;
      cursor: pointer;
      padding: 8px;
      border-radius: 8px;
      transition: background 0.2s;
    }

    .menu-toggle:hover {
      background: rgba(255,255,255,0.15);
    }

    .menu-toggle svg {
      width: 24px;
      height: 24px;
      display: block;
    }

    .header-title {
      font-size: 18px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .header-subtitle {
      font-size: 12px;
      opacity: 0.75;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .header-text {
      flex: 1;
      min-width: 0;
    }

    /* Search */
    .search-container {
      padding: 12px 16px;
      background: var(--primary-dark);
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }

    .search-input {
      width: 100%;
      padding: 10px 14px 10px 38px;
      border: none;
      border-radius: 10px;
      background: rgba(255,255,255,0.12);
      color: white;
      font-size: 15px;
      outline: none;
      transition: background 0.2s;
    }

    .search-input::placeholder {
      color: rgba(255,255,255,0.5);
    }

    .search-input:focus {
      background: rgba(255,255,255,0.2);
    }

    .search-wrapper {
      position: relative;
    }

    .search-icon {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      width: 18px;
      height: 18px;
      color: rgba(255,255,255,0.5);
    }

    /* Layout */
    .app-layout {
      display: flex;
      height: 100vh;
      height: 100dvh;
      padding-top: calc(var(--header-height) + var(--safe-top));
    }

    /* Sidebar */
    .sidebar {
      width: var(--sidebar-width);
      background: var(--primary);
      overflow-y: auto;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      -webkit-overflow-scrolling: touch;
    }

    .sidebar-nav {
      flex: 1;
      overflow-y: auto;
      padding-bottom: calc(20px + var(--safe-bottom));
    }

    .nav-section {
      padding: 0;
    }

    .nav-section-title {
      padding: 16px 16px 8px;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      color: var(--accent);
      position: sticky;
      top: 0;
      background: var(--primary);
      z-index: 1;
    }

    .nav-item {
      display: block;
      padding: 10px 16px 10px 24px;
      color: rgba(255,255,255,0.8);
      text-decoration: none;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.15s;
      border-left: 3px solid transparent;
    }

    .nav-item:hover {
      background: rgba(255,255,255,0.08);
      color: white;
    }

    .nav-item.active {
      background: rgba(255,255,255,0.12);
      color: white;
      border-left-color: var(--accent);
      font-weight: 500;
    }

    .nav-item-number {
      display: inline-block;
      min-width: 28px;
      color: var(--accent);
      font-weight: 600;
      font-size: 13px;
    }

    /* Main Content */
    .main-content {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding-bottom: calc(40px + var(--safe-bottom));
    }

    .article-container {
      max-width: 800px;
      margin: 0 auto;
      padding: 32px 24px;
    }

    .article-header {
      margin-bottom: 32px;
      padding-bottom: 20px;
      border-bottom: 2px solid var(--primary);
    }

    .article-number {
      display: inline-block;
      background: var(--primary);
      color: white;
      padding: 4px 14px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 12px;
      letter-spacing: 0.5px;
    }

    .article-title {
      font-size: 26px;
      font-weight: 700;
      color: var(--primary);
      line-height: 1.3;
    }

    .article-body {
      font-size: 16px;
      line-height: 1.8;
      color: var(--text);
    }

    .article-body p {
      margin-bottom: 16px;
    }

    .article-body ol,
    .article-body ul {
      margin-bottom: 16px;
      padding-left: 24px;
    }

    .article-body li {
      margin-bottom: 10px;
    }

    .article-body ol ol,
    .article-body ul ul,
    .article-body ol ul,
    .article-body ul ol {
      margin-top: 8px;
      margin-bottom: 8px;
    }

    .article-body h4 {
      font-size: 18px;
      color: var(--primary);
      margin: 24px 0 12px;
      font-weight: 600;
    }

    .article-body strong {
      color: var(--primary-dark);
    }

    /* Tables */
    .table-responsive {
      overflow-x: auto;
      margin: 16px 0;
      -webkit-overflow-scrolling: touch;
      border-radius: 10px;
      border: 1px solid var(--border);
    }

    .salary-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
      min-width: 400px;
    }

    .salary-table thead th {
      background: var(--primary);
      color: white;
      padding: 12px 14px;
      text-align: left;
      font-weight: 600;
      font-size: 13px;
      white-space: nowrap;
    }

    .salary-table tbody td {
      padding: 10px 14px;
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }

    .salary-table tbody tr:nth-child(even) {
      background: #f8fafc;
    }

    .salary-table tbody tr:hover {
      background: #eef2f7;
    }

    .salary-table tbody tr:last-child td {
      border-bottom: none;
    }

    /* Lire original values */
    .lire-original {
      display: inline-block;
      font-size: 12px;
      color: var(--text-secondary);
      font-style: italic;
      margin-left: 4px;
    }

    /* Article toolbar */
    .article-toolbar {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }

    .article-toolbar-title {
      flex: 1;
      font-size: 14px;
      font-weight: 600;
      color: var(--primary);
      min-width: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .toolbar-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 14px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--bg-card);
      color: var(--text);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
      white-space: nowrap;
      text-decoration: none;
    }

    .toolbar-btn:hover {
      border-color: var(--primary);
      background: var(--primary);
      color: white;
    }

    .toolbar-btn.whatsapp:hover {
      border-color: #25d366;
      background: #25d366;
      color: white;
    }

    .toolbar-btn svg {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
    }

    [data-theme="dark"] .toolbar-btn {
      background: var(--bg-card);
      border-color: var(--border);
    }

    [data-theme="dark"] .toolbar-btn:hover {
      background: var(--primary-light);
      border-color: var(--primary-light);
      color: white;
    }

    [data-theme="dark"] .toolbar-btn.whatsapp:hover {
      background: #25d366;
      border-color: #25d366;
    }

    /* Download button in sidebar */
    .sidebar-download {
      padding: 12px 16px;
      border-top: 1px solid rgba(255,255,255,0.1);
      background: var(--primary-dark);
      flex-shrink: 0;
    }

    .download-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      padding: 12px 16px;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 10px;
      background: rgba(255,255,255,0.08);
      color: white;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      text-decoration: none;
      font-family: inherit;
    }

    .download-btn:hover {
      background: rgba(255,255,255,0.16);
      border-color: rgba(255,255,255,0.35);
    }

    .download-btn svg {
      width: 18px;
      height: 18px;
    }

    @media (max-width: 768px) {
      .article-toolbar {
        gap: 8px;
      }

      .toolbar-btn {
        padding: 7px 10px;
        font-size: 12px;
      }

      .toolbar-btn span.btn-label-long {
        display: none;
      }

      .toolbar-btn span.btn-label-short {
        display: inline;
      }
    }

    @media (min-width: 769px) {
      .toolbar-btn span.btn-label-short {
        display: none;
      }
    }

    /* Nav buttons */
    .article-nav {
      display: flex;
      gap: 12px;
      margin-top: 40px;
      padding-top: 24px;
      border-top: 1px solid var(--border);
    }

    .article-nav-btn {
      flex: 1;
      padding: 14px 16px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.2s;
      text-align: left;
    }

    .article-nav-btn:hover {
      border-color: var(--primary);
      box-shadow: 0 2px 8px rgba(30,58,95,0.1);
    }

    .article-nav-btn.next {
      text-align: right;
    }

    .article-nav-label {
      font-size: 12px;
      color: var(--text-secondary);
      margin-bottom: 4px;
    }

    .article-nav-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--primary);
    }

    .article-nav-btn:disabled {
      opacity: 0.4;
      cursor: default;
    }

    /* Welcome page */
    .welcome {
      text-align: center;
      padding: 60px 24px;
    }

    .welcome-icon {
      width: 80px;
      height: 80px;
      background: var(--primary);
      border-radius: 20px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 24px;
      color: white;
      font-size: 32px;
      font-weight: 700;
    }

    .welcome h1 {
      font-size: 28px;
      color: var(--primary);
      margin-bottom: 12px;
    }

    .welcome p {
      color: var(--text-secondary);
      font-size: 16px;
      max-width: 500px;
      margin: 0 auto 32px;
    }

    .welcome-stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 16px;
      max-width: 500px;
      margin: 0 auto;
    }

    .welcome-stat {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
    }

    .welcome-stat-number {
      font-size: 28px;
      font-weight: 700;
      color: var(--primary);
    }

    .welcome-stat-label {
      font-size: 13px;
      color: var(--text-secondary);
    }

    .conversion-note {
      margin-top: 32px;
      background: #fff8e1;
      border: 1px solid #ffd54f;
      border-radius: 12px;
      padding: 16px 20px;
      text-align: left;
      max-width: 500px;
      margin-left: auto;
      margin-right: auto;
    }

    .conversion-note-title {
      font-weight: 600;
      color: #e65100;
      margin-bottom: 4px;
      font-size: 14px;
    }

    .conversion-note-text {
      font-size: 13px;
      color: #5d4037;
    }

    /* Overlay */
    .sidebar-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 49;
      -webkit-backdrop-filter: blur(2px);
      backdrop-filter: blur(2px);
    }

    /* Mobile */
    @media (max-width: 768px) {
      .menu-toggle {
        display: flex;
      }

      .sidebar {
        position: fixed;
        top: 0;
        left: 0;
        bottom: 0;
        z-index: 50;
        transform: translateX(-100%);
        transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        padding-top: calc(var(--header-height) + var(--safe-top));
        width: min(var(--sidebar-width), 85vw);
      }

      .sidebar.open {
        transform: translateX(0);
      }

      .sidebar-overlay.open {
        display: block;
      }

      .article-container {
        padding: 20px 16px;
      }

      .article-title {
        font-size: 22px;
      }

      .article-body {
        font-size: 15px;
      }

      .salary-table {
        font-size: 13px;
      }

      .salary-table thead th,
      .salary-table tbody td {
        padding: 8px 10px;
      }

      .lire-original {
        display: block;
        margin-left: 0;
        margin-top: 2px;
      }

      .welcome h1 {
        font-size: 24px;
      }

      .article-nav {
        flex-direction: column;
      }

      .article-nav-btn.next {
        text-align: left;
      }
    }

    /* Tablet */
    @media (min-width: 769px) and (max-width: 1024px) {
      :root {
        --sidebar-width: 280px;
      }
    }

    /* Large screens */
    @media (min-width: 1200px) {
      .article-container {
        padding: 40px 48px;
      }
    }

    /* Print */
    @media print {
      .sidebar, .header, .article-nav, .menu-toggle, .sidebar-overlay, .article-toolbar {
        display: none !important;
      }
      .app-layout {
        padding-top: 0;
      }
      .main-content {
        overflow: visible;
      }
      .lire-original {
        display: inline;
      }
    }

    /* Scrollbar */
    .sidebar-nav::-webkit-scrollbar,
    .main-content::-webkit-scrollbar {
      width: 6px;
    }

    .sidebar-nav::-webkit-scrollbar-track {
      background: transparent;
    }

    .sidebar-nav::-webkit-scrollbar-thumb {
      background: rgba(255,255,255,0.2);
      border-radius: 3px;
    }

    .main-content::-webkit-scrollbar-thumb {
      background: rgba(0,0,0,0.15);
      border-radius: 3px;
    }

    /* Search highlight */
    .search-highlight {
      background: #fef08a;
      padding: 1px 2px;
      border-radius: 2px;
    }

    /* No results */
    .no-results {
      padding: 32px 16px;
      text-align: center;
      color: rgba(255,255,255,0.5);
      font-size: 14px;
    }

    /* Theme switcher */
    .theme-switcher {
      display: flex;
      gap: 4px;
      padding: 12px 16px 0;
      background: var(--primary-dark);
    }

    .theme-btn {
      flex: 1;
      padding: 7px 0;
      border: 1px solid rgba(255,255,255,0.2);
      background: transparent;
      color: rgba(255,255,255,0.7);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
    }

    .theme-btn:first-child {
      border-radius: 8px 0 0 8px;
    }

    .theme-btn:last-child {
      border-radius: 0 8px 8px 0;
    }

    .theme-btn.active {
      background: rgba(255,255,255,0.2);
      color: white;
      border-color: rgba(255,255,255,0.35);
    }

    .theme-btn:hover:not(.active) {
      background: rgba(255,255,255,0.08);
    }

    /* Dark theme */
    [data-theme="dark"] {
      --bg: #121820;
      --bg-card: #1a2332;
      --text: #e2e8f0;
      --text-secondary: #94a3b8;
      --border: #2d3a4a;
      --primary-dark: #0a1020;
    }

    [data-theme="dark"] .article-body strong {
      color: #93b5e0;
    }

    [data-theme="dark"] .salary-table tbody tr:nth-child(even) {
      background: #1e2d3d;
    }

    [data-theme="dark"] .salary-table tbody tr:hover {
      background: #243447;
    }

    [data-theme="dark"] .conversion-note {
      background: #2a2210;
      border-color: #5c4a10;
    }

    [data-theme="dark"] .conversion-note-title {
      color: #e8a838;
    }

    [data-theme="dark"] .conversion-note-text {
      color: #c4a86a;
    }

    [data-theme="dark"] .article-nav-btn {
      background: var(--bg-card);
      border-color: var(--border);
    }

    [data-theme="dark"] .article-nav-btn:hover {
      border-color: var(--primary-light);
    }

    [data-theme="dark"] .welcome-stat {
      background: var(--bg-card);
      border-color: var(--border);
    }

    /* Fade in animation */
    .fade-in {
      animation: fadeIn 0.3s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <!-- Header -->
  <header class="header">
    <div class="header-inner">
      <button class="menu-toggle" onclick="toggleSidebar()" aria-label="Menu">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <line x1="3" y1="6" x2="21" y2="6"/>
          <line x1="3" y1="12" x2="21" y2="12"/>
          <line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
      </button>
      <div class="header-text">
        <div class="header-title">CCNL Piloti Elicotteri</div>
        <div class="header-subtitle">Rinnovo del 19 luglio 2001</div>
      </div>
    </div>
  </header>

  <div class="app-layout">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="theme-switcher">
        <button class="theme-btn" data-theme-choice="light" onclick="setTheme('light')">Giorno</button>
        <button class="theme-btn" data-theme-choice="dark" onclick="setTheme('dark')">Notte</button>
        <button class="theme-btn active" data-theme-choice="system" onclick="setTheme('system')">Sistema</button>
      </div>
      <div class="search-container">
        <div class="search-wrapper">
          <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"/>
            <line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          <input type="text" class="search-input" id="searchInput" placeholder="Cerca articolo..." oninput="filterArticles(this.value)">
        </div>
      </div>
      <nav class="sidebar-nav" id="sidebarNav"></nav>
      <div class="sidebar-download">
        <a class="download-btn" href="CCNL.pdf" download="CCNL_Piloti_Elicottero.pdf">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="7 10 12 15 17 10"/>
            <line x1="12" y1="15" x2="12" y2="3"/>
          </svg>
          Scarica CCNL
        </a>
      </div>
    </aside>

    <!-- Overlay for mobile -->
    <div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

    <!-- Main Content -->
    <main class="main-content" id="mainContent"></main>
  </div>

  <script src="data.js"></script>
  <script>
    let currentArticleId = null;
    let allArticles = [];

    // Flatten all articles for navigation
    function initArticles() {
      CCNL_DATA.sections.forEach(section => {
        section.articles.forEach(article => {
          allArticles.push({ ...article, sectionTitle: section.title, sectionId: section.id });
        });
      });
    }

    // Build sidebar navigation
    function buildSidebar() {
      const nav = document.getElementById('sidebarNav');
      let html = '';

      // Home link
      html += `<div class="nav-section">
        <a class="nav-item" data-id="home" onclick="showHome()">
          <span class="nav-item-number">&#9751;</span> Pagina iniziale
        </a>
      </div>`;

      CCNL_DATA.sections.forEach(section => {
        html += `<div class="nav-section">
          <div class="nav-section-title">${section.title}</div>`;
        section.articles.forEach(article => {
          const label = article.number ? `Art. ${article.number}` : article.title.substring(0, 12);
          html += `<a class="nav-item" data-id="${article.id}" onclick="showArticle('${article.id}')">
            ${article.number ? `<span class="nav-item-number">Art. ${article.number}</span>` : ''}
            ${article.title}
          </a>`;
        });
        html += '</div>';
      });

      nav.innerHTML = html;
    }

    // Show welcome/home page
    function showHome() {
      currentArticleId = null;
      updateActiveNav();
      const main = document.getElementById('mainContent');
      main.innerHTML = `
        <div class="article-container fade-in">
          <div class="welcome">
            <div class="welcome-icon">CCNL</div>
            <h1>CCNL Piloti di Elicottero</h1>
            <p>Contratto Collettivo Nazionale di Lavoro per i Piloti dipendenti da Imprese Elicotteristiche esercenti il trasporto aereo non di linea e il lavoro aereo.</p>
            <p style="font-size:14px; color: var(--text-secondary);">Rinnovo del CCNL 25 giugno 1998 - Stipulato il 19 luglio 2001</p>
            <div class="conversion-note">
              <div class="conversion-note-title">Conversione Lire / Euro</div>
              <div class="conversion-note-text">
                Tutti gli importi originariamente espressi in Lire italiane sono stati convertiti in Euro al tasso fisso di cambio: <strong>1 EUR = 1.936,27 ITL</strong>. L'importo originale in Lire è riportato tra parentesi.
              </div>
            </div>
          </div>
        </div>
      `;
      main.scrollTop = 0;
      closeSidebar();
    }

    // Show specific article
    function showArticle(articleId) {
      currentArticleId = articleId;
      const articleIndex = allArticles.findIndex(a => a.id === articleId);
      const article = allArticles[articleIndex];
      if (!article) return;

      updateActiveNav();

      const prev = articleIndex > 0 ? allArticles[articleIndex - 1] : null;
      const next = articleIndex < allArticles.length - 1 ? allArticles[articleIndex + 1] : null;

      const main = document.getElementById('mainContent');
      const toolbarTitle = article.number ? `Articolo ${article.number}` : article.title;
      main.innerHTML = `
        <div class="article-container fade-in">
          <div class="article-toolbar">
            <span class="article-toolbar-title">${toolbarTitle}</span>
            <button class="toolbar-btn" onclick="printArticle()">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
              <span>Stampa</span>
            </button>
            <button class="toolbar-btn whatsapp" onclick="shareWhatsApp()">
              <svg viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 0 1 2.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0 0 12.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 0 0 5.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 0 0-3.48-8.413z"/></svg>
              <span class="btn-label-long">Invia con WhatsApp</span>
              <span class="btn-label-short">WhatsApp</span>
            </button>
            <button class="toolbar-btn mail" onclick="shareMail()">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
              <span>Mail</span>
            </button>
          </div>
          <div class="article-header">
            <h1 class="article-title">${article.title}</h1>
          </div>
          <div class="article-body">
            ${article.content}
          </div>
          <div class="article-nav">
            ${prev ? `
              <button class="article-nav-btn prev" onclick="showArticle('${prev.id}')">
                <div class="article-nav-label">&larr; Precedente</div>
                <div class="article-nav-title">${prev.number ? 'Art. ' + prev.number + ' - ' : ''}${prev.title}</div>
              </button>
            ` : '<button class="article-nav-btn prev" disabled><div class="article-nav-label">Inizio</div></button>'}
            ${next ? `
              <button class="article-nav-btn next" onclick="showArticle('${next.id}')">
                <div class="article-nav-label">Successivo &rarr;</div>
                <div class="article-nav-title">${next.number ? 'Art. ' + next.number + ' - ' : ''}${next.title}</div>
              </button>
            ` : '<button class="article-nav-btn next" disabled><div class="article-nav-label">Fine</div></button>'}
          </div>
        </div>
      `;
      main.scrollTop = 0;
      closeSidebar();
    }

    // Update active state in sidebar
    function updateActiveNav() {
      document.querySelectorAll('.nav-item').forEach(item => {
        item.classList.toggle('active',
          currentArticleId ? item.dataset.id === currentArticleId : item.dataset.id === 'home'
        );
      });
    }

    // Filter articles in sidebar
    function filterArticles(query) {
      const q = query.toLowerCase().trim();
      const items = document.querySelectorAll('.nav-item[data-id]');
      const sections = document.querySelectorAll('.nav-section');

      if (!q) {
        items.forEach(item => item.style.display = '');
        sections.forEach(s => s.style.display = '');
        return;
      }

      sections.forEach(section => {
        let hasVisible = false;
        const sectionItems = section.querySelectorAll('.nav-item');
        sectionItems.forEach(item => {
          const text = item.textContent.toLowerCase();
          const match = text.includes(q);
          item.style.display = match ? '' : 'none';
          if (match) hasVisible = true;
        });
        const title = section.querySelector('.nav-section-title');
        if (title) {
          section.style.display = hasVisible ? '' : 'none';
        }
      });
    }

    // Print current article
    function printArticle() {
      const article = allArticles.find(a => a.id === currentArticleId);
      if (!article) return;
      const printWin = window.open('', '_blank');
      const title = article.number ? `Articolo ${article.number} - ${article.title}` : article.title;
      printWin.document.write(`<!DOCTYPE html><html lang="it"><head><meta charset="UTF-8"><title>${title}</title>
        <style>
          body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; padding: 40px; color: #1a1a2e; line-height: 1.7; max-width: 800px; margin: 0 auto; }
          h1 { font-size: 22px; margin-bottom: 8px; color: #1e3a5f; }
          .subtitle { font-size: 13px; color: #888; margin-bottom: 24px; padding-bottom: 16px; border-bottom: 2px solid #1e3a5f; }
          ol, ul { padding-left: 24px; } li { margin-bottom: 8px; }
          table { border-collapse: collapse; width: 100%; margin: 12px 0; font-size: 13px; }
          th { background: #1e3a5f; color: white; padding: 8px 10px; text-align: left; }
          td { padding: 7px 10px; border-bottom: 1px solid #ddd; }
          .lire-original { font-size: 11px; color: #888; font-style: italic; }
          @media print { body { padding: 20px; } }
        </style></head><body>
        <h1>${title}</h1>
        <div class="subtitle">CCNL Piloti di Elicottero - 19 luglio 2001</div>
        ${article.content}
      </body></html>`);
      printWin.document.close();
      printWin.focus();
      setTimeout(() => { printWin.print(); }, 300);
    }

    // Share via WhatsApp
    function shareWhatsApp() {
      const article = allArticles.find(a => a.id === currentArticleId);
      if (!article) return;
      const title = article.number ? `*Articolo ${article.number} - ${article.title}*` : `*${article.title}*`;
      const bodyEl = document.querySelector('.article-body');
      const plainText = bodyEl ? bodyEl.innerText : '';
      const maxLen = 3000;
      let text = `${title}\n_CCNL Piloti di Elicottero_\n\n${plainText}`;
      if (text.length > maxLen) {
        text = text.substring(0, maxLen) + '\n\n[...continua]';
      }
      const url = 'https://wa.me/?text=' + encodeURIComponent(text);
      window.open(url, '_blank');
    }

    // Share via Mail
    function shareMail() {
      const article = allArticles.find(a => a.id === currentArticleId);
      if (!article) return;
      const subject = article.number
        ? `CCNL Piloti di Elicottero - Articolo ${article.number}: ${article.title}`
        : `CCNL Piloti di Elicottero - ${article.title}`;
      const bodyEl = document.querySelector('.article-body');
      const plainText = bodyEl ? bodyEl.innerText : '';
      const body = `${subject}\n\n${plainText}`;
      window.location.href = 'mailto:?subject=' + encodeURIComponent(subject) + '&body=' + encodeURIComponent(body);
    }

    // Sidebar toggle for mobile
    function toggleSidebar() {
      const sidebar = document.getElementById('sidebar');
      const overlay = document.getElementById('sidebarOverlay');
      sidebar.classList.toggle('open');
      overlay.classList.toggle('open');
    }

    function closeSidebar() {
      const sidebar = document.getElementById('sidebar');
      const overlay = document.getElementById('sidebarOverlay');
      sidebar.classList.remove('open');
      overlay.classList.remove('open');
    }

    // Keyboard navigation
    document.addEventListener('keydown', (e) => {
      if (e.target.tagName === 'INPUT') return;

      if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
        e.preventDefault();
        const idx = allArticles.findIndex(a => a.id === currentArticleId);
        if (idx > 0) showArticle(allArticles[idx - 1].id);
      } else if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
        e.preventDefault();
        const idx = allArticles.findIndex(a => a.id === currentArticleId);
        if (idx < allArticles.length - 1) showArticle(allArticles[idx + 1].id);
      } else if (e.key === '/' || (e.metaKey && e.key === 'k')) {
        e.preventDefault();
        document.getElementById('searchInput').focus();
      }
    });

    // Handle swipe on mobile
    let touchStartX = 0;
    document.addEventListener('touchstart', (e) => {
      touchStartX = e.touches[0].clientX;
    }, { passive: true });

    document.addEventListener('touchend', (e) => {
      const deltaX = e.changedTouches[0].clientX - touchStartX;
      if (Math.abs(deltaX) > 80) {
        if (deltaX > 0 && touchStartX < 30) {
          toggleSidebar();
        } else if (deltaX < 0) {
          closeSidebar();
        }
      }
    }, { passive: true });

    // Theme management
    const systemDarkQuery = window.matchMedia('(prefers-color-scheme: dark)');

    function applyTheme(resolved) {
      document.documentElement.setAttribute('data-theme', resolved);
      const metaTheme = document.querySelector('meta[name="theme-color"]');
      if (metaTheme) metaTheme.content = resolved === 'dark' ? '#0a1020' : '#1e3a5f';
    }

    function setTheme(choice) {
      localStorage.setItem('ccnl-theme', choice);
      document.querySelectorAll('.theme-btn').forEach(b =>
        b.classList.toggle('active', b.dataset.themeChoice === choice)
      );
      if (choice === 'system') {
        applyTheme(systemDarkQuery.matches ? 'dark' : 'light');
      } else {
        applyTheme(choice);
      }
    }

    function initTheme() {
      const saved = localStorage.getItem('ccnl-theme') || 'system';
      setTheme(saved);
    }

    systemDarkQuery.addEventListener('change', () => {
      if ((localStorage.getItem('ccnl-theme') || 'system') === 'system') {
        applyTheme(systemDarkQuery.matches ? 'dark' : 'light');
      }
    });

    initTheme();

    // Init
    initArticles();
    buildSidebar();
    showHome();

    // Handle hash navigation
    function handleHash() {
      const hash = window.location.hash.substring(1);
      if (hash && allArticles.find(a => a.id === hash)) {
        showArticle(hash);
      }
    }
    window.addEventListener('hashchange', handleHash);
    if (window.location.hash) handleHash();

    // Register Service Worker for offline support
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js').catch(() => {});
    }
  </script>
</body>
</html>
